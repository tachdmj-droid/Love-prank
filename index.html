<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিশেষ উপহার!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        /* ক্যানভাস (পার্টিকেল হার্টের জন্য) */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* টেক্সট স্টাইল */
        .message-container {
            position: absolute;
            z-index: 2;
            text-align: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s ease;
            pointer-events: none;
        }

        .message-container.show {
            opacity: 1;
            transform: scale(1);
        }

        h1 {
            font-size: 2.5rem;
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.8), 0 0 20px rgba(255, 51, 102, 0.5);
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 30px;
            border-radius: 15px;
            border: 2px solid #ff3366;
            display: inline-block;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="message-container" id="message">
        <h1>কিরে বোদাই তর নানিকে Love You 💓</h1>
    </div>
